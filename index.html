<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-200">

<section class="max-w-5xl mx-auto px-5 py-10">

    <h1 class="text-4xl font-bold text-center text-blue-600 mb-8">
        Job Add / View / Delete
    </h1>

    <!-- FORM -->
    <div class="bg-white p-6 rounded-2xl shadow-lg">

        <input id="jobTitle" placeholder="Job Title"
            class="w-full border p-3 rounded-lg mb-4">

        <input id="jobSalary" placeholder="Salary"
            class="w-full border p-3 rounded-lg mb-4">

        <input id="jobDuration" placeholder="Duration"
            class="w-full border p-3 rounded-lg mb-4">

        <button onclick="addJob()"
            class="bg-blue-600 text-white px-6 py-3 rounded-lg w-full">
            Add Job
        </button>

    </div>

    <!-- JOB LIST -->
    <div id="jobList"
        class="grid grid-cols-1 md:grid-cols-3 gap-6 mt-10">
    </div>

</section>

<script>
let jobs = JSON.parse(localStorage.getItem("jobs")) || [];

function addJob() {

    let title = document.getElementById("jobTitle").value;
    let salary = document.getElementById("jobSalary").value;
    let duration = document.getElementById("jobDuration").value;

    // ✅ VALIDATION
    if (title === "" || salary === "" || duration === "") {
        alert("Please fill all fields");
        return;
    }

    let job = {
        id: Date.now(),
        title,
        salary,
        duration
    };

    jobs.push(job);
    localStorage.setItem("jobs", JSON.stringify(jobs));

    // clear
    document.getElementById("jobTitle").value = "";
    document.getElementById("jobSalary").value = "";
    document.getElementById("jobDuration").value = "";

    showJobs();
}

function showJobs() {

    let container = document.getElementById("jobList");
    container.innerHTML = "";

    jobs.forEach(job => {

        let card = document.createElement("div");

        card.className = "bg-white rounded-2xl shadow-lg p-5";

        card.innerHTML = `
            <h2 class="text-xl font-bold">${job.title}</h2>
            <p>Salary: ₹${job.salary}</p>
            <p>Duration: ${job.duration}</p>

            <button onclick="viewJob(${job.id})"
                class="bg-green-500 text-white w-full py-2 rounded mt-3">
                View Details
            </button>

            <button onclick="deleteJob(${job.id})"
                class="bg-red-500 text-white w-full py-2 rounded mt-2">
                Delete
            </button>
        `;

        container.appendChild(card);
    });
}

function deleteJob(id) {
    jobs = jobs.filter(job => job.id !== id);
    localStorage.setItem("jobs", JSON.stringify(jobs));
    showJobs();
}

function viewJob(id) {
    let job = jobs.find(j => j.id === id);

    alert(
`Job Title: ${job.title}
Salary: ₹${job.salary}
Duration: ${job.duration}`
    );
}

showJobs();
</script>

</body>
</html>
